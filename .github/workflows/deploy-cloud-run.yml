name: Deploy Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  ARTIFACT_REPOSITORY: ${{ vars.ARTIFACT_REPOSITORY || 'proofpilot' }}
  BACKEND_SERVICE: ${{ vars.BACKEND_SERVICE || 'proofpilot-backend' }}
  FRONTEND_SERVICE: ${{ vars.FRONTEND_SERVICE || 'proofpilot-frontend' }}
  BACKEND_RUNTIME_SERVICE_ACCOUNT: ${{ vars.BACKEND_RUNTIME_SERVICE_ACCOUNT }}
  FRONTEND_RUNTIME_SERVICE_ACCOUNT: ${{ vars.FRONTEND_RUNTIME_SERVICE_ACCOUNT }}
  VERTEX_LOCATION: ${{ vars.VERTEX_LOCATION || 'global' }}
  VERTEX_MODEL: ${{ vars.VERTEX_MODEL || 'gemini-3.5-flash' }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Backend install
        working-directory: apps/backend
        run: npm ci

      - name: Backend typecheck
        working-directory: apps/backend
        run: npm run build

      - name: Backend tests
        working-directory: apps/backend
        run: npm test

      - name: Frontend install
        working-directory: apps/frontend
        run: npm ci

      - name: Frontend build
        working-directory: apps/frontend
        run: npm run build

  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and push backend image
        run: |
          BACKEND_IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPOSITORY}/${BACKEND_SERVICE}:${GITHUB_SHA}"
          docker build -f apps/backend/Dockerfile -t "${BACKEND_IMAGE}" apps/backend
          docker push "${BACKEND_IMAGE}"
          echo "BACKEND_IMAGE=${BACKEND_IMAGE}" >> "${GITHUB_ENV}"

      - name: Deploy private backend
        run: |
          gcloud run deploy "${BACKEND_SERVICE}" \
            --image "${BACKEND_IMAGE}" \
            --region "${REGION}" \
            --service-account "${BACKEND_RUNTIME_SERVICE_ACCOUNT}" \
            --no-allow-unauthenticated \
            --set-env-vars "MOCK_MODE=false,PROOFPILOT_AGENT_RUNTIME=bespoke,PROOFPILOT_MODEL_PROVIDER=vertex,VERTEX_PROJECT_ID=${PROJECT_ID},VERTEX_LOCATION=${VERTEX_LOCATION},VERTEX_USE_METADATA_TOKEN=true,VERTEX_MODEL=${VERTEX_MODEL},PROOFPILOT_ELASTIC_PROVIDER=memory"

      - name: Read backend URL
        run: |
          BACKEND_URL="$(gcloud run services describe "${BACKEND_SERVICE}" --region "${REGION}" --format='value(status.url)')"
          echo "BACKEND_URL=${BACKEND_URL}" >> "${GITHUB_ENV}"

      - name: Grant frontend service account backend invoke access
        run: |
          gcloud run services add-iam-policy-binding "${BACKEND_SERVICE}" \
            --region "${REGION}" \
            --member "serviceAccount:${FRONTEND_RUNTIME_SERVICE_ACCOUNT}" \
            --role "roles/run.invoker" \
            --quiet

      - name: Build and push frontend image
        run: |
          FRONTEND_IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPOSITORY}/${FRONTEND_SERVICE}:${GITHUB_SHA}"
          docker build -f apps/frontend/Dockerfile -t "${FRONTEND_IMAGE}" apps/frontend
          docker push "${FRONTEND_IMAGE}"
          echo "FRONTEND_IMAGE=${FRONTEND_IMAGE}" >> "${GITHUB_ENV}"

      - name: Deploy public frontend
        id: deploy-frontend
        run: |
          gcloud run deploy "${FRONTEND_SERVICE}" \
            --image "${FRONTEND_IMAGE}" \
            --region "${REGION}" \
            --service-account "${FRONTEND_RUNTIME_SERVICE_ACCOUNT}" \
            --allow-unauthenticated \
            --set-env-vars "BACKEND_URL=${BACKEND_URL}"

      - name: Print service URLs
        run: |
          FRONTEND_URL="$(gcloud run services describe "${FRONTEND_SERVICE}" --region "${REGION}" --format='value(status.url)')"
          echo "Frontend: ${FRONTEND_URL}"
          echo "Backend: ${BACKEND_URL}"
